version: 2

models:
  - name: stg_order_items
    description: Clean order line items, one row per item purchased.
    columns:
      - name: order_item_id
        description: Primary key for an order item.
        data_type: integer
        tests: [not_null, unique]
      - name: order_id
        description: Order header this item belongs to.
        data_type: integer
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_orders')
                field: order_id
      - name: product_id
        description: Product SKU ordered on the line.
        data_type: varchar
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_products')
                field: product_id
