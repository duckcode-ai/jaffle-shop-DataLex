version: 2

models:
  - name: dim_customers
    description: Customer dimension table, one row per customer with lifecycle metrics.
    config:
      materialized: table
      contract:
        enforced: true
    meta:
      datalex:
        interface:
          enabled: true
          owner: analytics-engineering
          domain: commerce
          status: active
          version: v1
          description: Shared customer contract for lifecycle segmentation and customer-level order analysis.
          unique_key: customer_id
          freshness:
            warn_after: { count: 1, period: day }
          stability: shared
          audience: analytics engineers and metric owners
    columns:
      - name: customer_id
        description: Primary key for the customer.
        data_type: integer
        tests: [not_null, unique]
      - name: customer_name
        description: Customer display name.
        data_type: varchar
      - name: count_lifetime_orders
        description: Total number of orders placed by the customer.
        data_type: bigint
      - name: first_ordered_at
        description: Timestamp of the customer's first order.
        data_type: timestamp
      - name: last_ordered_at
        description: Timestamp of the customer's latest order.
        data_type: timestamp
      - name: lifetime_spend_pretax
        description: Customer lifetime item spend before tax.
        data_type: double
      - name: lifetime_spend
        description: Customer lifetime gross spend including tax.
        data_type: double
      - name: customer_type
        description: Lifecycle segment derived from order history.
        data_type: varchar
        tests:
          - accepted_values:
              arguments:
                values: ['new', 'returning']
