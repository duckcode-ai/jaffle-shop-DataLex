services:
  datalex:
    build:
      context: .
      args:
        DATALEX_VERSION: 1.3.4
    ports:
      - "3030:3030"
    environment:
      PORT: "3030"
    volumes:
      - .:/workspace
    command: >
      sh -c "rm -rf target
      && dbt seed --profiles-dir .
      && dbt build --profiles-dir .
      && datalex serve --project-dir /workspace --no-browser --port 3030"
